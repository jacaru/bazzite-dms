---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-dms
description: A personal BlueBuild recipe for a bazzite-gnome-nvidia-open flavor with Dank Material Shell.

base-image: ghcr.io/ublue-os/bazzite-gnome-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - avengemedia/dms
        - avengemedia/danklinux
    install:
      packages:
        - dms
        - dms-greeter
        - danksearch
        - dgop
        - quickshell-git
        - niri
        - xwayland-satellite
        - greetd
        - matugen
        - material-symbols-fonts

  - type: systemd
    system:
      enabled:
        - greetd
      disabled:
        - gdm
    user:
      enabled: []

  - type: signing # this sets up the proper policy & signing files for signed images to work fully

